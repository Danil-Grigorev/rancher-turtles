name: Display GITHUB_ENV

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  display-env:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Display GITHUB_ENV content
        run: |
          echo "GITHUB_ENV content:"
          echo "${{ toJson(secrets) }}"
